name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Environment / Additional Context
      description: OS, versions, logs, screenshots — anything relevant.
    validations:
      required: false
