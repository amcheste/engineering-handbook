# Pre-commit hooks — the first layer of the secret-scanning defense
# described in docs/philosophies/security-posture.md §4.
#
# One-time setup:  pre-commit install
# After that every `git commit` scans the staged diff; a detected secret
# fails the commit before it ever enters git history.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
